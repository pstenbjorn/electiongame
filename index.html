<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clearwater County — Election Administrator Trainer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span id="brandSeal" class="seal" aria-hidden="true">&#9733;</span>
      <div>
        <div id="brandTitle" class="brand-title">Clearwater County</div>
        <div id="brandSub" class="brand-sub">Office of the Election Director</div>
      </div>
    </div>
    <div class="meters">
      <div class="meter" title="Survives a court challenge or audit?">
        <span class="meter-label">Public Trust</span>
        <div class="meter-bar"><div id="trustFill" class="meter-fill"></div></div>
        <span id="trustValue" class="meter-value">100</span>
      </div>
      <div class="stat">
        <span class="stat-label">Case</span>
        <span id="caseProgress" class="stat-value">0 / 0</span>
      </div>
    </div>
  </header>

  <main id="app">
    <!-- Views are injected here by app.js -->
  </main>

  <footer class="footer">
    <span>Training simulation &mdash; nonpartisan. Candidates and parties are abstract by design.</span>
    <span id="moduleTag" class="module-tag">Module: Office Overview</span>
  </footer>

  <script src="config.js"></script>
  <script src="signature.js"></script>
  <script src="engine.js"></script>
  <!-- Modules self-register in this order; it sets the order on the hub. -->
  <script src="mod_petition.js"></script>
  <script src="mod_finance.js"></script>
  <script src="mod_siting.js"></script>
  <script src="mod_ballot.js"></script>
  <script src="mod_registration.js"></script>
  <script src="mod_vbm.js"></script>
  <script src="mod_provisional.js"></script>
  <script src="mod_results.js"></script>
  <script src="app.js"></script>
</body>
</html>
